<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERI-K Illustration Review</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0F1B33; color: #E8E8E8; min-height: 100vh; }

/* Header */
.header { background: #1B2A4A; padding: 16px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.4); }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.header h1 { color: #C9A84C; font-size: 22px; }
.header h1 span { color: #8899BB; font-size: 14px; font-weight: normal; margin-left: 12px; }
.stats { display: flex; gap: 16px; margin-bottom: 12px; font-size: 14px; align-items: center; flex-wrap: wrap; }
.stats .ok { color: #4ADE80; }
.stats .miss { color: #F87171; }
.stats .redo { color: #FB923C; }
.stats .total { color: #93A3C0; }
.export-btn { padding: 8px 16px; border-radius: 8px; border: 2px solid #C9A84C; background: transparent;
  color: #C9A84C; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; white-space: nowrap; }
.export-btn:hover { background: #C9A84C; color: #1B2A4A; }

/* Tabs */
.tabs { display: flex; flex-wrap: wrap; gap: 4px; }
.tab { padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
  background: #253454; color: #8899BB; border: 1px solid transparent; transition: all .15s; user-select: none; }
.tab:hover { background: #2E4068; color: #C9A84C; }
.tab.active { background: #C9A84C; color: #1B2A4A; border-color: #C9A84C; }
.tab.redo-tab { border: 1px solid #FB923C44; }
.tab.redo-tab.active { background: #FB923C; color: #1B2A4A; border-color: #FB923C; }

/* Grid & Cards */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 20px 24px; }
.card { background: #1B2A4A; border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: transform .15s, box-shadow .15s; border: 2px solid transparent; position: relative; }
.card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.4); border-color: #C9A84C44; }
.card.redo-marked { border-color: #EF4444 !important; box-shadow: 0 0 12px rgba(239,68,68,.3); }
.card .img-wrap { width: 100%; aspect-ratio: 1; background: #253454;
  display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.card .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.card .img-wrap .fail { font-size: 48px; }
.card .img-wrap .badge { position: absolute; top: 6px; right: 6px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge.ok { background: #065F46; color: #4ADE80; }
.badge.miss { background: #7F1D1D; color: #F87171; }
.badge.redo-badge { background: #7C2D12; color: #FB923C; }

/* Redo button on card */
.redo-btn { position: absolute; top: 6px; left: 6px; width: 30px; height: 30px; border-radius: 50%;
  background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.2); color: #FFF; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; z-index: 10; line-height: 1; }
.redo-btn:hover { background: rgba(251,146,60,.8); border-color: #FB923C; transform: scale(1.1); }
.redo-btn.active { background: #EF4444; border-color: #EF4444; }

/* Card info */
.card .info { padding: 10px 12px; }
.card .info .kr { font-size: 18px; font-weight: 700; color: #FFFFFF; }
.card .info .km { font-size: 14px; color: #93A3C0; margin-top: 3px; line-height: 1.3; }
.card .info .cat { font-size: 11px; color: #C9A84C; margin-top: 5px; display: inline-block;
  background: #C9A84C22; padding: 2px 8px; border-radius: 3px; }
.card .info .id { font-size: 10px; color: #556680; margin-top: 4px; }

/* Lightbox */
.lb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 200;
  align-items: center; justify-content: center; }
.lb-overlay.show { display: flex; }
.lb-content { position: relative; max-width: 90vw; max-height: 90vh; text-align: center; }
.lb-content img { max-width: 80vw; max-height: 70vh; border-radius: 10px; box-shadow: 0 0 40px rgba(201,168,76,.3); }
.lb-content .fail-big { font-size: 120px; }
.lb-info { color: #FFF; margin-top: 12px; }
.lb-info .kr { font-size: 28px; font-weight: 700; }
.lb-info .km { font-size: 18px; color: #93A3C0; margin-top: 4px; }
.lb-info .cat { color: #C9A84C; font-size: 14px; margin-top: 4px; }
.lb-close { position: absolute; top: -40px; right: 0; font-size: 28px; color: #AAA;
  cursor: pointer; background: none; border: none; }
.lb-close:hover { color: #FFF; }
.lb-nav { position: absolute; top: 50%; transform: translateY(-50%); font-size: 40px; color: #C9A84C;
  cursor: pointer; background: rgba(0,0,0,.5); border: none; border-radius: 50%;
  width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; }
.lb-nav:hover { background: rgba(201,168,76,.3); }
.lb-prev { left: -70px; }
.lb-next { right: -70px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 300;
  align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #1B2A4A; border-radius: 14px; padding: 24px; width: 90vw; max-width: 480px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6); border: 1px solid #C9A84C44; }
.modal h3 { color: #C9A84C; font-size: 16px; margin-bottom: 4px; }
.modal .modal-word { color: #FFF; font-size: 22px; font-weight: 700; margin-bottom: 14px; }
.modal textarea { width: 100%; height: 100px; background: #0F1B33; border: 1px solid #334466; border-radius: 8px;
  color: #E8E8E8; padding: 12px; font-size: 14px; resize: vertical; font-family: inherit; }
.modal textarea:focus { outline: none; border-color: #C9A84C; }
.modal .modal-actions { display: flex; gap: 10px; margin-top: 14px; justify-content: flex-end; }
.modal .btn { padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
.modal .btn-save { background: #C9A84C; color: #1B2A4A; }
.modal .btn-save:hover { background: #D4B65E; }
.modal .btn-cancel { background: #334466; color: #93A3C0; }
.modal .btn-cancel:hover { background: #3D5070; }
.modal .btn-remove { background: #7F1D1D; color: #F87171; }
.modal .btn-remove:hover { background: #991B1B; }

/* Toast */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #065F46;
  color: #4ADE80; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,.4); z-index: 400; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

@media (max-width: 768px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; padding: 12px; }
  .lb-prev { left: 10px; }
  .lb-next { right: 10px; }
  .lb-nav { width: 40px; height: 40px; font-size: 28px; }
  .header-top { flex-direction: column; align-items: flex-start; gap: 8px; }
}
</style>
</head>

<div class="header">
  <div class="header-top">
    <h1>VERI-K Illustration Review <span id="genDate"></span></h1>

  <div class="stats">

</div>

<!-- Redo Prompt Modal -->

      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="saveRedo()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

var BASE = "https://rtaltczlzccupsuzemcj.supabase.co/storage/v1/object/public/word-cards/illustrations/";
var imgStatus = {};
var redoMap = {};
var currentDay = "ALL";
var filteredWords = [];
var lbIndex = -1;
var modalKey = null;

document.getElementById("genDate").textContent = "Generated: " + new Date().toISOString().slice(0,16).replace("T"," ");

// Build tabs
var days = [];
var daySet = {};
WORDS.forEach(function(w) { if (!daySet[w.day_number]) { daySet[w.day_number] = true; days.push(w.day_number); } });
days.sort(function(a,b) { return a - b; });
var tabsEl = document.getElementById("tabs");

function mkTab(label, day, extraClass) {
  var el = document.createElement("div");
  el.className = "tab" + (extraClass ? " " + extraClass : "");
  el.textContent = label;
  el.setAttribute("data-day", day);
  el.onclick = function() { selectDay(day, el); };
  return el;
}

var redoTab = mkTab("Redo (0)", "REDO", "redo-tab");
redoTab.id = "redoTab";
tabsEl.appendChild(redoTab);

var allTab = mkTab("ALL", "ALL");
allTab.classList.add("active");
tabsEl.appendChild(allTab);
days.forEach(function(d) { tabsEl.appendChild(mkTab("Day " + d, d)); });

function selectDay(day, tabEl) {
  currentDay = day;
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  tabEl.classList.add("active");
  render();
}

function imgUrl(w) {
  return BASE + w.day_number + "_" + w.sort_order + ".png";
}

function key(w) { return w.day_number + "_" + w.sort_order; }

function render() {
  if (currentDay === "REDO") {
    filteredWords = WORDS.filter(function(w) { return !!redoMap[key(w)]; });
  } else if (currentDay === "ALL") {
    filteredWords = WORDS.slice();
  } else {
    filteredWords = WORDS.filter(function(w) { return w.day_number === currentDay; });
  }
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  filteredWords.forEach(function(w, i) {
    var card = document.createElement("div");
    card.className = "card";
    var k = key(w);
    var isRedo = !!redoMap[k];
    if (isRedo) card.classList.add("redo-marked");

    // Image area click opens lightbox
    var status = imgStatus[k];
    var badgeHTML = "";
    if (isRedo) {
      badgeHTML = "<span class=\"badge redo-badge\">REDO</span>";
    } else if (status) {
      badgeHTML = "<span class=\"badge " + status + "\">" + (status === "ok" ? "OK" : "MISS") + "</span>";
    }
    var imgHTML;
    if (status === "miss") {
      imgHTML = "<div class=\"fail\">&#10060;</div>";
    } else {
      imgHTML = "<img src=\"" + imgUrl(w) + "\" loading=\"lazy\" onerror=\"onFail('" + k + "',this)\" onload=\"onOk('" + k + "')\">";
    }

    var redoBtnClass = "redo-btn" + (isRedo ? " active" : "");
    card.innerHTML =
      "<div class=\"img-wrap\" id=\"wrap-" + k + "\">" +
        "<button class=\"" + redoBtnClass + "\" data-key=\"" + k + "\" onclick=\"event.stopPropagation(); onRedoClick('" + k + "')\">&#128260;</button>" +
        imgHTML + badgeHTML +
      "</div>" +
      "<div class=\"info\">" +
        "<div class=\"kr\">" + w.korean + "</div>" +
        "<div class=\"km\">" + w.meaning_khmer + "</div>" +
        "<div class=\"cat\">" + w.category + "</div>" +
        "<div class=\"id\">DAY " + w.day_number + " &middot; #" + w.sort_order + "</div>" +
      "</div>";
    card.onclick = function() { openLB(i); };
    grid.appendChild(card);
  });
  updateStats();
}

function onFail(k, img) {
  imgStatus[k] = "miss";
  var wrap = document.getElementById("wrap-" + k);
  if (wrap) {
    var btn = wrap.querySelector(".redo-btn");
    var btnHTML = btn ? btn.outerHTML : "";
    var isRedo = !!redoMap[k];
    var badgeHTML = isRedo ? "<span class=\"badge redo-badge\">REDO</span>" : "<span class=\"badge miss\">MISS</span>";
    wrap.innerHTML = btnHTML + "<div class=\"fail\">&#10060;</div>" + badgeHTML;
  }
  updateStats();
}

function onOk(k) {
  imgStatus[k] = "ok";
  var wrap = document.getElementById("wrap-" + k);
  if (wrap && !wrap.querySelector(".badge")) {
    var isRedo = !!redoMap[k];
    if (isRedo) {
      wrap.insertAdjacentHTML("beforeend", "<span class=\"badge redo-badge\">REDO</span>");
    } else {
      wrap.insertAdjacentHTML("beforeend", "<span class=\"badge ok\">OK</span>");
    }
  }
  updateStats();
}

function updateStats() {
  var relevant;
  if (currentDay === "REDO") {
    relevant = WORDS.filter(function(w) { return !!redoMap[key(w)]; });
  } else if (currentDay === "ALL") {
    relevant = WORDS;
  } else {
    relevant = WORDS.filter(function(w) { return w.day_number === currentDay; });
  }
  var ok = 0, miss = 0;
  relevant.forEach(function(w) {
    var s = imgStatus[key(w)];
    if (s === "ok") ok++;
    else if (s === "miss") miss++;
  });
  document.getElementById("okCount").textContent = ok;
  document.getElementById("missCount").textContent = miss;
  document.getElementById("totalCount").textContent = relevant.length;

  // Global redo count
  var redoCount = Object.keys(redoMap).length;
  document.getElementById("redoCount").textContent = redoCount;
  document.getElementById("redoTab").textContent = "Redo (" + redoCount + ")";
}

// Redo system
function onRedoClick(k) {
  modalKey = k;
  var w = WORDS.find(function(w) { return key(w) === k; });
  document.getElementById("modalWord").textContent = w.korean + " (" + w.meaning_khmer + ")";
  var existing = redoMap[k];
  document.getElementById("modalPrompt").value = existing || "";
  document.getElementById("modalRemoveBtn").style.display = existing ? "inline-block" : "none";
  document.getElementById("redoModal").classList.add("show");
  document.getElementById("modalPrompt").focus();
}

function saveRedo() {
  var prompt = document.getElementById("modalPrompt").value.trim();
  redoMap[modalKey] = prompt || "(no prompt)";
  closeModal();
  render();
  showToast("Marked for redo");
}

function removeRedo() {
  delete redoMap[modalKey];
  closeModal();
  render();
  showToast("Redo marking removed");
}

function closeModal() {
  document.getElementById("redoModal").classList.remove("show");
  modalKey = null;
}

// Export
function exportRedo() {
  var keys = Object.keys(redoMap);
  if (keys.length === 0) {
    alert("No items marked for redo");
    return;
  }
  var list = keys.map(function(k) {
    var w = WORDS.find(function(w) { return key(w) === k; });
    return {
      day: w.day_number,
      sort_order: w.sort_order,
      korean: w.korean,
      meaning_khmer: w.meaning_khmer,
      category: w.category,
      custom_prompt: redoMap[k]
    };
  }).sort(function(a,b) { return a.day - b.day || a.sort_order - b.sort_order; });

  var json = JSON.stringify(list, null, 2);

  // Copy to clipboard
  navigator.clipboard.writeText(json).then(function() {
    showToast("Copied to clipboard + downloading JSON");
  }).catch(function() {
    showToast("Downloading JSON (clipboard blocked)");
  });

  // Download file
  var blob = new Blob([json], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "redo_list.json";
  a.click();
  URL.revokeObjectURL(url);
}

// Toast
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2000);
}

// Lightbox
function openLB(i) {
  lbIndex = i;
  showLB();
  document.getElementById("lightbox").classList.add("show");
}

function closeLB() {
  document.getElementById("lightbox").classList.remove("show");
  lbIndex = -1;
}

function navLB(dir) {
  lbIndex = (lbIndex + dir + filteredWords.length) % filteredWords.length;
  showLB();
}

function showLB() {
  var w = filteredWords[lbIndex];
  var k = key(w);
  var lbImg = document.getElementById("lbImg");
  if (imgStatus[k] === "miss") {
    lbImg.innerHTML = "<div class=\"fail-big\">&#10060;</div>";
  } else {
    lbImg.innerHTML = "<img src=\"" + imgUrl(w) + "\" onerror=\"this.outerHTML='<div class=fail-big>&#10060;</div>'\">";
  }
  document.getElementById("lbKr").textContent = w.korean;
  document.getElementById("lbKm").textContent = w.meaning_khmer;
  document.getElementById("lbCat").textContent = w.category + " | Day " + w.day_number + " #" + w.sort_order;
}

document.addEventListener("keydown", function(e) {
  // Modal open - handle Escape
  if (document.getElementById("redoModal").classList.contains("show")) {
    if (e.key === "Escape") closeModal();
    return;
  }
  if (lbIndex < 0) return;
  if (e.key === "Escape") closeLB();
  if (e.key === "ArrowLeft") navLB(-1);
  if (e.key === "ArrowRight") navLB(1);
});

document.getElementById("lightbox").addEventListener("click", function(e) {
  if (e.target.id === "lightbox") closeLB();
});

document.getElementById("redoModal").addEventListener("click", function(e) {
  if (e.target.id === "redoModal") closeModal();
});

render();
</script>
</body>
</html>
