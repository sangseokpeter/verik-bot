[build]
builder = "nixpacks"

[build.nixpacks]
aptPkgs = ["fontconfig", "fonts-noto-cjk", "fonts-noto-core"]

[deploy]
startCommand = "cp fonts/*.ttf /usr/share/fonts/ 2>/dev/null; fc-cache -f; npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
