[build]
builder = "nixpacks"

[build.nixpacks]
aptPkgs = ["python3", "python3-pip", "python3-pil", "fontconfig", "fonts-noto-cjk", "fonts-noto-core", "ffmpeg"]
nixPkgs = ["python3", "ffmpeg"]

[deploy]
startCommand = "pip3 install requests Pillow 2>/dev/null || pip install requests Pillow 2>/dev/null || true; npm start"

[variables]
NIXPACKS_PKGS = "python3 python3Packages.pip python3Packages.pillow python3Packages.requests"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
