[build]
builder = "nixpacks"

[build.nixpacks]
aptPkgs = ["python3", "python3-pip", "python3-pil", "fontconfig", "fonts-noto-cjk", "fonts-noto-core", "ffmpeg"]
nixPkgs = ["python3", "ffmpeg"]

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
