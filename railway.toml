[build]
builder = "nixpacks"

[build.nixpacks]
aptPkgs = ["python3", "python3-pip", "fontconfig", "fonts-noto-cjk", "fonts-noto-core"]

[deploy]
startCommand = "pip3 install Pillow --break-system-packages -q && fc-cache -f 2>/dev/null; npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
