<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERI-K Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#D4A843',
            cream: '#FFF8E7',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { border: 3px solid #e5e7eb; border-top-color: #D4A843; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<script>
// ============================================================
// Supabase Configuration — 여기에 값을 입력하세요
// ============================================================
const SUPABASE_URL = 'https://rtaltczlzccupsuzemcj.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE';
// ============================================================

const headers = {
  'apikey': SUPABASE_ANON_KEY,
  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'count=exact'
};

async function supabaseGet(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers });
  if (!res.ok) throw new Error(`API error: ${res.status} ${res.statusText}`);
  const count = res.headers.get('content-range');
  const data = await res.json();
  return { data, count };
}

// Paginated fetch for tables that may exceed 1000 rows
async function supabaseGetAll(path) {
  const allData = [];
  let offset = 0;
  const limit = 1000;
  const separator = path.includes('?') ? '&' : '?';
  while (true) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${path}${separator}offset=${offset}&limit=${limit}`,
      { headers: { ...headers, 'Range': `${offset}-${offset + limit - 1}` } }
    );
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const data = await res.json();
    allData.push(...data);
    if (data.length < limit) break;
    offset += limit;
  }
  return allData;
}

// ============================================================
// State
// ============================================================
let studentsData = [];
let quizSessionsData = [];
let dailyActivityData = [];
let wrongWordsData = [];
let wordsMap = {};

// ============================================================
// Data Loading
// ============================================================
async function loadAllData() {
  showLoading(true);
  try {
    const [students, sessions, activity, wrongWords, words] = await Promise.all([
      supabaseGetAll('students?select=*&order=id.asc'),
      supabaseGetAll('quiz_sessions?select=*&order=completed_at.desc'),
      supabaseGetAll('daily_activity?select=*&order=activity_date.desc'),
      supabaseGetAll('wrong_word_tracker?select=*&is_mastered=eq.false&order=wrong_count.desc'),
      supabaseGetAll('words?select=id,korean,meaning_khmer,day_number,sort_order'),
    ]);

    studentsData = students;
    quizSessionsData = sessions;
    dailyActivityData = activity;
    wrongWordsData = wrongWords;
    words.forEach(w => { wordsMap[w.id] = w; });

    renderStudentList();
    renderSummary();
  } catch (err) {
    document.getElementById('main-content').innerHTML = `
      <div class="text-center py-20">
        <p class="text-red-500 text-lg font-bold">데이터 로드 실패</p>
        <p class="text-gray-500 mt-2">${escapeHtml(err.message)}</p>
        <p class="text-gray-400 text-sm mt-4">SUPABASE_ANON_KEY를 확인하세요</p>
      </div>`;
  }
  showLoading(false);
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'flex' : 'none';
}

// ============================================================
// Helpers
// ============================================================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function daysSince(dateStr) {
  if (!dateStr) return Infinity;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / (1000 * 60 * 60 * 24));
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
}

function formatDateTime(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function getStudentName(s) {
  if (s.first_name) return s.first_name + (s.last_name ? ' ' + s.last_name : '');
  if (s.username) return '@' + s.username;
  return 'ID: ' + s.id;
}

function getLastActivity(studentId) {
  const activities = dailyActivityData.filter(a => a.student_id === studentId);
  if (activities.length === 0) return null;
  return activities.reduce((latest, a) => a.activity_date > latest ? a.activity_date : latest, activities[0].activity_date);
}

function getStudentQuizStats(studentId) {
  const sessions = quizSessionsData.filter(s => s.student_id === studentId && s.is_completed);
  if (sessions.length === 0) return { count: 0, avg: 0 };
  const totalScore = sessions.reduce((sum, s) => sum + (s.total_questions > 0 ? (s.correct_answers / s.total_questions) * 100 : 0), 0);
  return { count: sessions.length, avg: Math.round(totalScore / sessions.length) };
}

// ============================================================
// Summary Cards
// ============================================================
function renderSummary() {
  const active = studentsData.filter(s => s.is_active).length;
  const total = studentsData.length;
  const inactive2d = studentsData.filter(s => s.is_active && daysSince(getLastActivity(s.id)) >= 2).length;
  const todaySessions = quizSessionsData.filter(s => {
    if (!s.completed_at) return false;
    const d = new Date(s.completed_at);
    const now = new Date();
    return d.toDateString() === now.toDateString();
  });
  const todayQuizCount = todaySessions.length;

  document.getElementById('summary').innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 uppercase tracking-wide">전체 학생</p>
        <p class="text-2xl font-bold text-gray-800 mt-1">${total}</p>
        <p class="text-xs text-green-500 mt-1">${active} 활성</p>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 uppercase tracking-wide">2일+ 미활동</p>
        <p class="text-2xl font-bold ${inactive2d > 0 ? 'text-red-500' : 'text-gray-800'} mt-1">${inactive2d}</p>
        <p class="text-xs text-gray-400 mt-1">주의 필요</p>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 uppercase tracking-wide">오늘 퀴즈</p>
        <p class="text-2xl font-bold text-gray-800 mt-1">${todayQuizCount}</p>
        <p class="text-xs text-gray-400 mt-1">완료 세션</p>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 uppercase tracking-wide">총 퀴즈 세션</p>
        <p class="text-2xl font-bold text-gray-800 mt-1">${quizSessionsData.filter(s => s.is_completed).length}</p>
        <p class="text-xs text-gray-400 mt-1">전체 누적</p>
      </div>
    </div>`;
}

// ============================================================
// Student List
// ============================================================
function renderStudentList() {
  const container = document.getElementById('student-list');
  const activeStudents = studentsData.filter(s => s.is_active);
  const inactiveStudents = studentsData.filter(s => !s.is_active);
  const sorted = [...activeStudents, ...inactiveStudents];

  let html = `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 text-left text-xs text-gray-500 uppercase tracking-wide">
            <th class="px-4 py-3">학생</th>
            <th class="px-4 py-3 text-center">Day</th>
            <th class="px-4 py-3 text-center hidden sm:table-cell">퀴즈 참여</th>
            <th class="px-4 py-3 text-center hidden sm:table-cell">평균 점수</th>
            <th class="px-4 py-3 text-center">마지막 활동</th>
            <th class="px-4 py-3 text-center">상태</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">`;

  sorted.forEach(s => {
    const name = getStudentName(s);
    const stats = getStudentQuizStats(s.id);
    const lastAct = getLastActivity(s.id);
    const days = daysSince(lastAct);
    const isInactive2d = s.is_active && days >= 2;
    const rowBg = isInactive2d ? 'bg-red-50 hover:bg-red-100' : 'hover:bg-gray-50';
    const statusBadge = !s.is_active
      ? '<span class="px-2 py-0.5 rounded-full text-xs bg-gray-200 text-gray-500">비활성</span>'
      : isInactive2d
        ? `<span class="px-2 py-0.5 rounded-full text-xs bg-red-100 text-red-600">${days}일 미활동</span>`
        : '<span class="px-2 py-0.5 rounded-full text-xs bg-green-100 text-green-600">활성</span>';

    const avgColor = stats.avg >= 80 ? 'text-green-600' : stats.avg >= 50 ? 'text-yellow-600' : stats.count > 0 ? 'text-red-500' : 'text-gray-400';

    html += `
      <tr class="${rowBg} cursor-pointer transition-colors" onclick="showStudentDetail('${s.id}')">
        <td class="px-4 py-3">
          <p class="font-medium text-gray-800">${escapeHtml(name)}</p>
          ${s.username ? `<p class="text-xs text-gray-400">@${escapeHtml(s.username)}</p>` : ''}
        </td>
        <td class="px-4 py-3 text-center">
          <span class="inline-block bg-gold/10 text-gold font-bold rounded-lg px-2 py-0.5 text-xs">Day ${s.current_day || '-'}</span>
        </td>
        <td class="px-4 py-3 text-center hidden sm:table-cell font-medium">${stats.count}</td>
        <td class="px-4 py-3 text-center hidden sm:table-cell font-medium ${avgColor}">${stats.count > 0 ? stats.avg + '%' : '-'}</td>
        <td class="px-4 py-3 text-center text-gray-500">${formatDate(lastAct)}</td>
        <td class="px-4 py-3 text-center">${statusBadge}</td>
      </tr>`;
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

// ============================================================
// Student Detail Modal
// ============================================================
function showStudentDetail(studentId) {
  const student = studentsData.find(s => String(s.id) === String(studentId));
  if (!student) return;

  const modal = document.getElementById('detail-modal');
  const content = document.getElementById('detail-content');
  const name = getStudentName(student);
  const stats = getStudentQuizStats(student.id);
  const lastAct = getLastActivity(student.id);

  // Quiz sessions for this student
  const sessions = quizSessionsData
    .filter(s => s.student_id === student.id && s.is_completed)
    .slice(0, 20);

  // Wrong words for this student
  const wrongWords = wrongWordsData.filter(w => w.student_id === student.id);

  // Activity history (last 14 days)
  const activities = dailyActivityData
    .filter(a => a.student_id === student.id)
    .slice(0, 14);

  let html = `
    <div class="fade-in">
      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-xl font-bold text-gray-800">${escapeHtml(name)}</h2>
          <p class="text-sm text-gray-400">${student.username ? '@' + escapeHtml(student.username) : ''} | Telegram ID: ${student.id}</p>
        </div>
        <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>

      <!-- Quick Stats -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
        <div class="bg-cream rounded-lg p-3 text-center">
          <p class="text-xs text-gray-500">현재 Day</p>
          <p class="text-lg font-bold text-gold">${student.current_day || '-'}</p>
        </div>
        <div class="bg-cream rounded-lg p-3 text-center">
          <p class="text-xs text-gray-500">퀴즈 참여</p>
          <p class="text-lg font-bold text-gray-700">${stats.count}회</p>
        </div>
        <div class="bg-cream rounded-lg p-3 text-center">
          <p class="text-xs text-gray-500">평균 점수</p>
          <p class="text-lg font-bold ${stats.avg >= 80 ? 'text-green-600' : stats.avg >= 50 ? 'text-yellow-600' : 'text-red-500'}">${stats.count > 0 ? stats.avg + '%' : '-'}</p>
        </div>
        <div class="bg-cream rounded-lg p-3 text-center">
          <p class="text-xs text-gray-500">마지막 활동</p>
          <p class="text-lg font-bold text-gray-700">${formatDate(lastAct)}</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-gray-200 mb-4">
        <button id="tab-quiz" onclick="switchTab('quiz')" class="px-4 py-2 text-sm font-medium border-b-2 border-gold text-gold">퀴즈 결과</button>
        <button id="tab-wrong" onclick="switchTab('wrong')" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600">틀린 단어 (${wrongWords.length})</button>
        <button id="tab-activity" onclick="switchTab('activity')" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600">활동 내역</button>
      </div>

      <!-- Tab: Quiz Results -->
      <div id="panel-quiz">
        ${sessions.length === 0 ? '<p class="text-gray-400 text-sm py-4 text-center">퀴즈 기록 없음</p>' : `
        <div class="space-y-2 max-h-80 overflow-y-auto">
          ${sessions.map(s => {
            const pct = s.total_questions > 0 ? Math.round((s.correct_answers / s.total_questions) * 100) : 0;
            const barColor = pct >= 80 ? 'bg-green-400' : pct >= 50 ? 'bg-yellow-400' : 'bg-red-400';
            return `
            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
              <div class="flex-shrink-0 w-16 text-center">
                <span class="text-xs font-medium px-2 py-0.5 rounded-full ${s.quiz_type === 'weekly' ? 'bg-purple-100 text-purple-600' : 'bg-blue-100 text-blue-600'}">${s.quiz_type === 'weekly' ? '주간' : 'Day ' + s.day_number}</span>
              </div>
              <div class="flex-1">
                <div class="flex justify-between text-xs mb-1">
                  <span class="text-gray-500">${s.correct_answers}/${s.total_questions} 정답</span>
                  <span class="font-medium ${pct >= 80 ? 'text-green-600' : pct >= 50 ? 'text-yellow-600' : 'text-red-500'}">${pct}%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-1.5">
                  <div class="${barColor} h-1.5 rounded-full" style="width:${pct}%"></div>
                </div>
              </div>
              <div class="flex-shrink-0 text-xs text-gray-400">${formatDate(s.completed_at)}</div>
            </div>`;
          }).join('')}
        </div>`}
      </div>

      <!-- Tab: Wrong Words -->
      <div id="panel-wrong" class="hidden">
        ${wrongWords.length === 0 ? '<p class="text-gray-400 text-sm py-4 text-center">틀린 단어 없음</p>' : `
        <div class="max-h-80 overflow-y-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-xs text-gray-400 uppercase">
                <th class="text-left py-2 px-2">단어</th>
                <th class="text-left py-2 px-2">의미</th>
                <th class="text-center py-2 px-2">틀린 횟수</th>
                <th class="text-center py-2 px-2">연속 정답</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              ${wrongWords.slice(0, 30).map(ww => {
                const word = wordsMap[ww.word_id];
                return `
                <tr class="hover:bg-gray-50">
                  <td class="py-2 px-2 font-medium">${word ? escapeHtml(word.korean) : ww.word_id}</td>
                  <td class="py-2 px-2 text-gray-500">${word ? escapeHtml(word.meaning_khmer) : '-'}</td>
                  <td class="py-2 px-2 text-center">
                    <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium ${ww.wrong_count >= 3 ? 'bg-red-100 text-red-600' : 'bg-yellow-100 text-yellow-600'}">${ww.wrong_count}</span>
                  </td>
                  <td class="py-2 px-2 text-center text-gray-500">${ww.consecutive_correct || 0}/3</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`}
      </div>

      <!-- Tab: Activity -->
      <div id="panel-activity" class="hidden">
        ${activities.length === 0 ? '<p class="text-gray-400 text-sm py-4 text-center">활동 기록 없음</p>' : `
        <div class="space-y-2 max-h-80 overflow-y-auto">
          ${activities.map(a => `
            <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50">
              <div class="w-2 h-2 rounded-full ${a.quiz_completed ? 'bg-green-400' : 'bg-gray-300'}"></div>
              <span class="text-sm text-gray-600">${a.activity_date}</span>
              <span class="text-xs ${a.quiz_completed ? 'text-green-500' : 'text-gray-400'}">${a.quiz_completed ? '퀴즈 완료' : '활동만'}</span>
            </div>
          `).join('')}
        </div>`}
      </div>
    </div>`;

  content.innerHTML = html;
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-modal').classList.add('hidden');
  document.body.style.overflow = '';
}

function switchTab(tab) {
  ['quiz', 'wrong', 'activity'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById(`tab-${t}`);
    if (t === tab) {
      btn.classList.add('border-gold', 'text-gold');
      btn.classList.remove('border-transparent', 'text-gray-400');
    } else {
      btn.classList.remove('border-gold', 'text-gold');
      btn.classList.add('border-transparent', 'text-gray-400');
    }
  });
}

// Close modal on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// Init
window.addEventListener('DOMContentLoaded', loadAllData);
</script>

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-10">
  <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-gold rounded-lg flex items-center justify-center">
        <span class="text-white font-bold text-sm">V</span>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-800">VERI-K Admin</h1>
        <p class="text-xs text-gray-400">TOPIK I 학습 관리</p>
      </div>
    </div>
    <button onclick="loadAllData()" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm text-gray-600 transition-colors">
      새로고침
    </button>
  </div>
</header>

<!-- Loading -->
<div id="loading" class="flex items-center justify-center py-20" style="display:flex">
  <div class="text-center">
    <div class="spinner mx-auto mb-3"></div>
    <p class="text-sm text-gray-400">데이터 로딩 중...</p>
  </div>
</div>

<!-- Main Content -->
<main id="main-content" class="max-w-5xl mx-auto px-4 py-6">
  <div id="summary"></div>
  <div id="student-list"></div>
</main>

<!-- Student Detail Modal -->
<div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/40" onclick="closeDetail()"></div>
  <div id="detail-content" class="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 z-10"></div>
</div>

</body>
</html>
